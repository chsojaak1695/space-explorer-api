version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: space_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: space_explorer

  redis:
    image: redis:7-alpine
    container_name: space_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  api:
    build: .
    container_name: space_api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/space_explorer
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis
    env_file:
      - .env

volumes:
  mongo_data:
